<!DOCTYPE html>

<head>

<style>
  :root { --bg:#0e0f12; --card:#17191f; --line:rgba(255,255,255,.08); --txt:#f2f3f5; --mut:#9aa3ad; --acc:#f6a821; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--txt); font-family:system-ui,'Segoe UI',Roboto,sans-serif; padding:16px; max-width:560px; margin:0 auto; }
  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  h1 { font-size:1.15rem; letter-spacing:.3px; } h1 span { color:var(--acc); }
  .lang { display:flex; border:1px solid var(--line); border-radius:20px; overflow:hidden; }
  .lang button { background:transparent; color:var(--mut); border:0; padding:6px 14px; font-size:.8rem; font-weight:700; cursor:pointer; }
  .lang button.on { background:var(--acc); color:#1a1203; }
  #chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .chip { border:1px solid var(--line); background:var(--card); color:var(--txt); border-radius:18px; padding:7px 12px; font-size:.8rem; cursor:pointer; }
  .chip.on { border-color:var(--acc); color:var(--acc); }
  .btn { display:block; width:100%; border:0; border-radius:12px; padding:13px; font-size:.95rem; font-weight:800; cursor:pointer; }
  #btn-generate { background:var(--acc); color:#1a1203; margin-bottom:14px; }
  .block { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .block h2 { font-size:.72rem; text-transform:uppercase; letter-spacing:1px; color:var(--mut); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .copy { border:1px solid var(--line); background:transparent; color:var(--mut); border-radius:8px; padding:3px 10px; font-size:.7rem; cursor:pointer; }
  .block ul { list-style:none; } .block li { padding:4px 0; font-size:.9rem; }
  .block li::before { content:'▸ '; color:var(--acc); }
  #idea-what { font-size:.95rem; margin-bottom:8px; line-height:1.4; }
  #caption-text, #hashtags-text { font-size:.88rem; line-height:1.45; color:var(--txt); word-break:break-word; }
  .row { display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; }
  .row .btn { flex:1; min-width:130px; background:var(--card); color:var(--txt); border:1px solid var(--line); font-weight:600; font-size:.82rem; padding:10px; }
  #btn-share { border-color:var(--acc); color:var(--acc); }
  #btn-ai { display:none; border-color:#7c5cff; color:#b9a7ff; }
  #ai-extra:empty { display:none; }
  #ai-extra { background:rgba(124,92,255,.08); border:1px solid rgba(124,92,255,.35); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  #toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#222833; color:var(--txt); padding:9px 16px; border-radius:20px; font-size:.8rem; opacity:0; transition:opacity .25s; pointer-events:none; box-shadow:0 4px 14px rgba(0,0,0,.5); }
  #toast.show { opacity:1; }
  .hidden { display:none !important; }
  footer { text-align:center; color:var(--mut); font-size:.68rem; margin-top:18px; }
</style>
</head>
<body>
<header>
  <h1>Reels da <span>Bechy</span> 📸</h1>
  <div class="lang">
    <button id="lang-pt" class="on">PT</button>
    <button id="lang-es">ES</button>
  </div>
</header>
<div id="chips"></div>
<button id="btn-generate" class="btn">Gerar ideia ✨</button>
<div id="result" class="hidden">
  <div class="block" id="idea-block">
    <h2><span id="t-idea">Ideia</span><button class="copy" data-copy="idea">Copiar</button></h2>
    <div id="idea-title" style="color:var(--acc);font-weight:700;font-size:.85rem;margin-bottom:6px;"></div>
    <div id="idea-what"></div>
    <ul id="idea-shots"></ul>
  </div>
  <div class="block" id="hooks-block">
    <h2><span id="t-hooks">Ganchos</span><button class="copy" data-copy="hooks">Copiar</button></h2>
    <ul id="hooks-list"></ul>
  </div>
  <div class="block" id="caption-block">
    <h2><span id="t-caption">Caption</span><button class="copy" data-copy="caption">Copiar</button></h2>
    <div id="caption-text"></div>
  </div>
  <div class="block" id="hashtags-block">
    <h2><span id="t-hashtags">Hashtags</span><button class="copy" data-copy="hashtags">Copiar</button></h2>
    <div id="hashtags-text"></div>
  </div>
  <div id="ai-extra"></div>
  <div class="row">
    <button id="btn-another" class="btn">🎲 Outra ideia</button>
    <button id="btn-rehooks" class="btn">🔁 Outros ganchos</button>
    <button id="btn-share" class="btn">📲 Compartilhar</button>
    <button id="btn-ai" class="btn">✨ Expandir com IA</button>
  </div>
</div>
<div id="toast"></div>
<footer>feito com ❤ para Bechy · funciona offline</footer>

    { pt: 'Bastidores honestos: nem sempre é glamour, mas o resultado paga cada passo. Compartilha com quem precisa ver isso 🔁', es: 'Detrás de cámaras honesto: no siempre es glamour, pero el resultado paga cada paso. Comparte con quien necesita verlo 🔁' },
    { pt: 'Este é o tipo de lugar que me lembra por que comecei a fotografar. Salva e me conta: você iria? 📌', es: 'Este es el tipo de lugar que me recuerda por qué empecé a fotografiar. Guárdalo y cuéntame: ¿irías? 📌' },
    { pt: 'Edição não é trapaça — é a metade da história. Quer ver o passo a passo completo? Comenta "QUERO" 👇', es: 'Editar no es trampa — es la mitad de la historia. ¿Quieres el paso a paso completo? Comenta "QUIERO" 👇' },
    { pt: 'A natureza fez o show, eu só apertei o botão. Segue para não perder o próximo 🌿', es: 'La naturaleza hizo el show, yo solo apreté el botón. Sígueme para no perderte el próximo 🌿' },
    { pt: 'Spot secreto desbloqueado 🤫 Salva antes que todo mundo descubra 📌', es: 'Spot secreto desbloqueado 🤫 Guárdalo antes de que todos lo descubran 📌' },
    { pt: 'Uma dica simples, uma foto completamente diferente. Testa e me marca no resultado! 📸', es: 'Un tip simple, una foto completamente diferente. ¡Pruébalo y etiquétame en el resultado! 📸' },
    { pt: 'Colecionando amanheceres — este entrou para o top 3 do ano. Segue a viagem por aqui ✨', es: 'Coleccionando amaneceres — este entró al top 3 del año. Sigue el viaje por aquí ✨' }
  ],
  hashtags: {
    base: ['#fotografia', '#photography', '#reels', '#reelsinstagram', '#natureza', '#naturephotography'],
    landscape: ['#paisagem', '#landscape', '#landscapephotography', '#goldenhour', '#sunset', '#bluehour', '#longexposure', '#mountains'],
    travel: ['#viagem', '#travel', '#travelphotography', '#wanderlust', '#explore', '#trip'],
    pt: ['#fotografiabrasil', '#brasilpaisagens', '#pordosol', '#amanhecer', '#dicasdefoto'],
    es: ['#fotografiadepaisaje', '#atardecer', '#paisajes', '#viajeros', '#fotodeldia']
  }
};

function _rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function _pickN(arr, n) {
  var copy = arr.slice(), out = [];
  while (out.length < n && copy.length) out.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);
  return out;
}
function _t(item, lang) { return (item && (item[lang] || item.pt)) || ''; }
function fillPlaceholders(text, lang) {
  return String(text)
    .replace(/\{lugar\}/g, _rand(CONTENT.places[lang] || CONTENT.places.pt))
    .replace(/\{hora\}/g, _rand(CONTENT.hours[lang] || CONTENT.hours.pt));
}
function pickSubTheme(id) {
  if (id) { for (var i = 0; i < CONTENT.subthemes.length; i++) if (CONTENT.subthemes[i].id === id) return CONTENT.subthemes[i]; }
  return _rand(CONTENT.subthemes);
}
var _lastIdeaRef = null, _lastHookIdx = [];
function rerollHooks(lang) {
  var n = 3 + Math.floor(Math.random() * 3); // 3-5
  var all = CONTENT.hooks.map(function (_, i) { return i; });
  var fresh = all.filter(function (i) { return _lastHookIdx.indexOf(i) === -1; });
  var chosen = _pickN(fresh.length >= n ? fresh : all, n);
  _lastHookIdx = chosen;
  return chosen.map(function (i) { return fillPlaceholders(_t(CONTENT.hooks[i], lang), lang); });
}
function buildHashtags(lang) {
  var h = CONTENT.hashtags;
  var set = h.base.concat(_pickN(h.landscape, 6), _pickN(h.travel, 5), _pickN(h[lang] || h.pt, 5));
  var seen = {}, out = [];
  for (var i = 0; i < set.length; i++) if (!seen[set[i]]) { seen[set[i]] = 1; out.push(set[i]); }
  return out.slice(0, 22);
}
function generate(subTheme, lang) {
  var st = subTheme || pickSubTheme(null);
  var idea = _rand(st.ideas);
  if (st.ideas.length > 1 && _lastIdeaRef === idea) idea = st.ideas[(st.ideas.indexOf(idea) + 1) % st.ideas.length];
  _lastIdeaRef = idea;
  return {
    subThemeId: st.id,
    subThemeName: _t(st.name, lang),
    idea: {
      what: fillPlaceholders(_t(idea.what, lang), lang),
      shots: idea.shots.map(function (s) { return _t(s, lang); })
    },
    hooks: rerollHooks(lang),
    caption: fillPlaceholders(_t(_rand(CONTENT.captions), lang), lang),
    hashtags: buildHashtags(lang)
  };
}
/*__CORE_END__*/
</script>
<script>
// AI-expand — optional, local Ollama only. Hidden unless localhost:11434 responds.
// On the https GitHub Pages URL the probe fails instantly (mixed content) -> button stays hidden.
(function () {
  var OLLAMA = 'http://localhost:11434';
  var model = null;
  window.initAI = function (lang, getResult, toast) {
    var btn = document.getElementById('btn-ai');
    var extra = document.getElementById('ai-extra');
    function probe() {
      var ctl = new AbortController();
      var t = setTimeout(function () { ctl.abort(); }, 1500);
      fetch(OLLAMA + '/api/tags', { signal: ctl.signal })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) {
          clearTimeout(t);
          if (d && d.models && d.models.length) { model = d.models[0].name; btn.style.display = 'block'; }
        })
        .catch(function () { clearTimeout(t); });
    }
    btn.onclick = function () {
      var cur = getResult();
      if (!cur || !model) return;
      var isPt = (document.documentElement.lang || 'pt') === 'pt';
      btn.disabled = true;
      btn.textContent = isPt ? 'Gerando…' : 'Generando…';
      var prompt = 'You help a landscape/travel/nature photographer make Instagram Reels. '
        + 'Reel idea: "' + cur.subThemeName + ' — ' + cur.idea.what + '". '
        + 'Respond ONLY with JSON: {"hooks": [5 short punchy hooks], "captions": [2 caption variations ending with a call-to-action]} '
        + 'in ' + (isPt ? 'Brazilian Portuguese' : 'Spanish') + '.';
      fetch(OLLAMA + '/api/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: model, prompt: prompt, stream: false, format: 'json' })
      })
        .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
        .then(function (d) {
          var out = JSON.parse(d.response || '{}');
          var hooks = Array.isArray(out.hooks) ? out.hooks : [];
          var caps = Array.isArray(out.captions) ? out.captions : [];
          if (!hooks.length && !caps.length) throw new Error('empty');
          var esc = function (s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;'); };
          extra.innerHTML = '<h2 style="font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:#b9a7ff;margin-bottom:8px;">✨ '
            + (isPt ? 'Extras da IA' : 'Extras de la IA') + '</h2>'
            + (hooks.length ? '<ul>' + hooks.map(function (h) { return '<li>' + esc(h) + '</li>'; }).join('') + '</ul>' : '')
            + caps.map(function (c) { return '<div style="margin-top:8px;font-size:.88rem;line-height:1.45;">' + esc(c) + '</div>'; }).join('');
        })
        .catch(function () { toast(isPt ? 'IA indisponível' : 'IA no disponible'); })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = isPt ? '✨ Expandir com IA' : '✨ Expandir con IA';
        });
    };
    probe();
  };
})();
</script>
<script>
(function () {
  var UI = {
    pt: { generate: 'Gerar ideia ✨', surprise: '🎲 Surpreenda-me', another: '🎲 Outra ideia',
          rehooks: '🔁 Outros ganchos', share: '📲 Compartilhar', ai: '✨ Expandir com IA',
          copy: 'Copiar', copied: 'Copiado ✓', idea: 'Ideia', what: 'O que gravar:',
          hooks: 'Ganchos', caption: 'Caption', hashtags: 'Hashtags',
          shareHint: 'Copiado — cola no Instagram 📲', title: 'Reels da <span>Bechy</span> 📸' },
    es: { generate: 'Generar idea ✨', surprise: '🎲 Sorpréndeme', another: '🎲 Otra idea',
          rehooks: '🔁 Otros ganchos', share: '📲 Compartir', ai: '✨ Expandir con IA',
          copy: 'Copiar', copied: 'Copiado ✓', idea: 'Idea', what: 'Qué grabar:',
          hooks: 'Ganchos', caption: 'Caption', hashtags: 'Hashtags',
          shareHint: 'Copiado — pégalo en Instagram 📲', title: 'Reels de <span>Bechy</span> 📸' }
  };
  var lang = 'pt';
  try { lang = localStorage.getItem('bechy-lang') || 'pt'; } catch (e) {}
  if (lang !== 'pt' && lang !== 'es') lang = 'pt';
  var selectedTheme = null;   // null => surprise (random)
  var current = null;         // last generate() result

  function $(id) { return document.getElementById(id); }
  function toast(msg) {
    var t = $('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(t._h); t._h = setTimeout(function () { t.classList.remove('show'); }, 2200);
  }
  function copyText(text, okMsg) {
    function fallback() {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta); toast(okMsg);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function () { toast(okMsg); }, fallback);
    } else fallback();
  }
  function blockText(kind) {
    if (!current) return '';
    if (kind === 'idea') return current.subThemeName + ' — ' + current.idea.what + '\n' +
      current.idea.shots.map(function (s) { return '- ' + s; }).join('\n');
    if (kind === 'hooks') return current.hooks.join('\n');
    if (kind === 'caption') return current.caption;
    if (kind === 'hashtags') return current.hashtags.join(' ');
    return '';
  }
  function renderChips() {
    var u = UI[lang], html = '';
    html += '<button class="chip' + (selectedTheme === null ? ' on' : '') + '" data-theme="">' + u.surprise + '</button>';
    CONTENT.subthemes.forEach(function (st) {
      html += '<button class="chip' + (selectedTheme === st.id ? ' on' : '') + '" data-theme="' + st.id + '">'
            + st.icon + ' ' + _t(st.name, lang) + '</button>';
    });
    $('chips').innerHTML = html;
    Array.prototype.forEach.call($('chips').children, function (btn) {
      btn.onclick = function () {
        selectedTheme = btn.getAttribute('data-theme') || null;
        renderChips();
        doGenerate();
      };
    });
  }
  function renderLabels() {
    var u = UI[lang];
    document.querySelector('header h1').innerHTML = u.title;
    $('btn-generate').textContent = u.generate;
    $('btn-another').textContent = u.another;
    $('btn-rehooks').textContent = u.rehooks;
    $('btn-share').textContent = u.share;
    $('btn-ai').textContent = u.ai;
    $('t-idea').textContent = u.idea; $('t-hooks').textContent = u.hooks;
    $('t-caption').textContent = u.caption; $('t-hashtags').textContent = u.hashtags;
    Array.prototype.forEach.call(document.querySelectorAll('.copy'), function (b) { b.textContent = u.copy; });
    $('lang-pt').classList.toggle('on', lang === 'pt');
    $('lang-es').classList.toggle('on', lang === 'es');
    document.documentElement.lang = lang;
  }
  function renderResult() {
    if (!current) return;
    var u = UI[lang];
    $('idea-title').textContent = current.subThemeName;
    $('idea-what').innerHTML = '<strong>' + u.what + '</strong> ' + current.idea.what;
    $('idea-shots').innerHTML = current.idea.shots.map(function (s) { return '<li>' + s + '</li>'; }).join('');
    $('hooks-list').innerHTML = current.hooks.map(function (h) { return '<li>' + h + '</li>'; }).join('');
    $('caption-text').textContent = current.caption;
    $('hashtags-text').textContent = current.hashtags.join(' ');
    $('ai-extra').innerHTML = '';
    $('result').classList.remove('hidden');
  }
  function doGenerate() {
    current = generate(selectedTheme ? pickSubTheme(selectedTheme) : null, lang);
    renderResult();
  }
  function setLang(l) {
    lang = l;
    try { localStorage.setItem('bechy-lang', l); } catch (e) {}
    renderLabels(); renderChips();
    if (current) doGenerate(); // regenerate in the new language
  }

  $('lang-pt').onclick = function () { setLang('pt'); };
  $('lang-es').onclick = function () { setLang('es'); };
  $('btn-generate').onclick = doGenerate;
  $('btn-another').onclick = doGenerate;
  $('btn-rehooks').onclick = function () {
    if (!current) return doGenerate();
    current.hooks = rerollHooks(lang); renderResult();
  };
  Array.prototype.forEach.call(document.querySelectorAll('.copy'), function (b) {
    b.onclick = function () { copyText(blockText(b.getAttribute('data-copy')), UI[lang].copied); };
  });
  $('btn-share').onclick = function () {
    if (!current) return;
    var text = current.caption + '\n\n' + current.hashtags.join(' ');
    if (navigator.share) {
      navigator.share({ text: text }).catch(function () {});
    } else {
      copyText(text, UI[lang].shareHint);
    }
  };

  // AI-expand: wired in Task 3. Stub keeps Task 2 self-contained.
  if (typeof window.initAI !== 'function') window.initAI = function () {};

  renderLabels(); renderChips();
  window.initAI(lang, function () { return current; }, toast);
  window.__bechy = { getLang: function () { return lang; }, getResult: function () { return current; } };
})();
</script>
